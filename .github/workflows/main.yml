name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    name: Lint & Type Check (Web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Type check
        run: npm run build
        working-directory: web

  database-migrations:
    name: Validate Migrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verify Migrations
        run: supabase db lint

  deploy-web:
    name: Deploy to Vercel
    needs: [lint-and-test, database-migrations]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Placeholder for actual Vercel deployment action
      - name: Deploy to Vercel
        run: echo "Deploying to Vercel..."

  deploy-db:
    name: Deploy Migrations
    needs: [database-migrations]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: supabase/setup-cli@v1
        with:
          version: latest
      - name: Push Migrations
        run: |
          # In a real scenario, we would use SUPABASE_ACCESS_TOKEN and PROJECT_ID
          echo "Pushing migrations to Supabase Production..."
          # supabase db push --access-token ${{ secrets.SUPABASE_ACCESS_TOKEN }} --project-id ${{ secrets.SUPABASE_PROJECT_ID }}

  ios-build-check:
    name: Build Check (iOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Select Xcode Version
        run: sudo xcode-select -s /Applications/Xcode_15.4.app
      - name: Verify Swift files
        run: |
          echo "Validating SwiftUI code structure..."
          # This performs a syntax and type check on all Swift files in the mobile directory
          # It ensures the code compiles even without a full .xcodeproj file present yet.
          find mobile -name "*.swift" -print0 | xargs -0 xcrun -sdk iphonesimulator swiftc -typecheck
